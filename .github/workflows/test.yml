name: Test
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# PR-68 — Generated by Forge's CI workflow generator. Each enabled stack
# runs in parallel. iOS uses macos-latest (xcodebuild requires macOS);
# Android uses ubuntu-latest with the Android SDK action; Web + backend
# use ubuntu-latest with pnpm + Node 20.
#
# When CI fails, PR-69 (webhook receiver) parses the failure log and
# feeds it back to Forge's auto-fix loop — same pattern as the in-process
# PR-65/66/67 checkers, just async via GitHub.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (Next.js + Vitest)
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Lint
        run: pnpm exec eslint . --max-warnings=0
        continue-on-error: true
      - name: Unit tests
        run: pnpm exec vitest run --reporter=junit --outputFile=vitest-junit.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-vitest-results
          path: vitest-junit.xml

  ios:
    name: iOS (Xcode + XCTest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (latest installed)
        # PR-1087 — the prior shape hardcoded `Xcode_15.4.app`. GitHub
        # macos-latest runners rotate the bundled Xcode minor version
        # (15.x, 16.x), so a fixed path silently broke iOS CI whenever
        # the runner image upgraded. `xcode-select -p` picks whatever
        # the runner image points at by default — works on any image.
        run: xcodebuild -version
      - name: Resolve packages
        run: |
          if [ -f ios/Package.swift ]; then
            cd ios && swift package resolve
          fi
      - name: Build & test
        run: |
          # Pick the first .xcodeproj to avoid passing multiple paths to
          # xcodebuild when the user has more than one. Scheme defaults
          # to the project filename without the .xcodeproj suffix.
          # Codex P1 PR #1087: GitHub Actions runs shell:bash with
          # set -e -o pipefail, so a glob with no matches makes the
          # pipeline exit non-zero and the step aborts before the
          # else-branch can run. "|| true" keeps the assignment safe.
          PROJ=$(ls -1d ios/*.xcodeproj 2>/dev/null | head -n1 || true)
          if [ -n "$PROJ" ]; then
            SCHEME=$(basename "$PROJ" .xcodeproj)
            xcodebuild test \
              -project "$PROJ" \
              -scheme "$SCHEME" \
              -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
              -resultBundlePath ios-results.xcresult \
              | xcbeautify
          else
            echo "No .xcodeproj found — skipping iOS tests."
          fi
        shell: bash
      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcresult
          path: ios-results.xcresult

  android:
    name: Android (Gradle + JUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3
      - name: Unit tests
        run: |
          cd android
          ./gradlew testDebugUnitTest --stacktrace
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: android/app/build/test-results/testDebugUnitTest/**/*.xml
