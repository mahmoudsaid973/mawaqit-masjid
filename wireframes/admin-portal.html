<div class='bg-bg-gray-900 h-screen'>
      <header class='bg-indigo-600 text-white p-4 flex justify-between'>
        <h1 class='text-text-white font-bold text-lg'>Mawaqit Masjid Admin Portal</h1>
        <nav class='flex items-center space-x-4'>
          <a href='/prayer-times' class='text-text-white hover:text-text-gray-300'>Prayer Times</a>
          <a href='/events-and-khutbah-topics' class='text-text-white hover:text-text-gray-300'>Events and Khutbah Topics</a>
          <a href='/quran-reader' class='text-text-white hover:text-text-gray-300'>Quran Reader</a>
        </nav>
      </header>
      <main class='p-4 flex flex-col space-y-8'>
        <section class='bg-bg-gray-800 p-4 rounded-md shadow-md'>
          <h2 class='text-text-white font-bold text-lg'>User Management</h2>
          <table class='w-full text-text-gray-300'>
            <thead class='bg-bg-gray-700'>
              <tr>
                <th class='py-2'>ID</th>
                <th class='py-2'>Name</th>
                <th class='py-2'>Email</th>
                <th class='py-2'>Role</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class='py-2'>1</td>
                <td class='py-2'>John Doe</td>
                <td class='py-2'>john@example.com</td>
                <td class='py-2'>Admin</td>
              </tr>
              <tr>
                <td class='py-2'>2</td>
                <td class='py-2'>Jane Smith</td>
                <td class='py-2'>jane@example.com</td>
                <td class='py-2'>User</td>
              </tr>
              <tr>
                <td class='py-2'>3</td>
                <td class='py-2'>Bob Johnson</td>
                <td class='py-2'>bob@example.com</td>
                <td class='py-2'>Imam</td>
              </tr>
            </tbody>
          </table>
        </section>
        <section class='bg-bg-gray-800 p-4 rounded-md shadow-md'>
          <h2 class='text-text-white font-bold text-lg'>Billing Management</h2>
          <form class='flex flex-col space-y-4'>
            <label class='text-text-gray-300'>Plan:</label>
            <select class='bg-gray-700 text-white p-2 rounded-md border border-gray-600'>
              <option>Basic</option>
              <option>Premium</option>
            </select>
            <label class='text-text-gray-300'>Payment Method:</label>
            <select class='bg-gray-700 text-white p-2 rounded-md border border-gray-600'>
              <option>Card</option>
              <option>Bank Transfer</option>
            </select>
            <button class='bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md'>Update Billing</button>
          </form>
        </section>
        <section class='bg-bg-gray-800 p-4 rounded-md shadow-md'>
          <h2 class='text-text-white font-bold text-lg'>Push Notification Management</h2>
          <form class='flex flex-col space-y-4'>
            <label class='text-text-gray-300'>Message:</label>
            <textarea class='bg-gray-700 text-white p-2 rounded-md border border-gray-600'></textarea>
            <button class='bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md'>Send Notification</button>
          </form>
        </section>
      </main>
    </div>
