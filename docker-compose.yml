version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${DB_USER:-app_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app_password}
      POSTGRES_DB: ${DB_NAME:-app_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Express Backend API
  backend:
    build: ./backend
    container_name: express_backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-app_user}:${DB_PASSWORD:-app_password}@postgres:5432/${DB_NAME:-app_db}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build: ./frontend
    container_name: nextjs_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: app_network
    driver: bridge

# Note: Mobile apps (SwiftUI, Kotlin Compose) require native build environments
# (Xcode for iOS, Android Studio for Android) and are not included in this
# runtime docker-compose orchestration.